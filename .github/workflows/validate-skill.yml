name: Validate Skill

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run extractor tests
        run: python -m unittest discover -s tests -v

      - name: Extract and compile the scanner
        run: |
          python scripts/extract_scan_live.py --output /tmp/scan_live.py
          python -m py_compile /tmp/scan_live.py
